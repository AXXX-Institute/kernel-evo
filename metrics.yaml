specs:
  speedup:
    description: Speedup vs reference runtime (ref_runtime_us / runtime_us). Higher is better.
    decimals: 4
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 100.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: 0.0

  runtime_us:
    description: Median runtime of custom model (microseconds). Lower is better.
    decimals: 3
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 1000000000.0
    include_in_prompts: true
    significant_change: 10.0
    sentinel_value: 1000000000.0

  ref_runtime_us:
    description: Median runtime of reference model (microseconds).
    decimals: 3
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 1000000000.0
    include_in_prompts: false
    significant_change: 10.0
    sentinel_value: 1000000000.0

  compiled:
    description: Whether the custom model compiled (1 yes, 0 no)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0.0

  correctness:
    description: Whether the custom model matched reference outputs (1 yes, 0 no)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0.0

  is_valid:
    description: Whether the program is valid (1 valid, 0 invalid)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0.0

