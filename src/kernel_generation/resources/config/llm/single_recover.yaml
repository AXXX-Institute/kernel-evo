# @package _global_
# LLM client with JSON recovery: include_raw, salvage from exception, normalize top-level list field.
# Override in Hydra with: llm=llm/single (or set in defaults).

llm:
  _target_: kernel_generation.core.llm.models.json_recover_router.MultiModelRouterWithJsonRecover
  _convert_: all
  models:
    - _target_: langchain_openai.ChatOpenAI
      model: ${model_name}
      api_key: ${oc.env:OPENAI_API_KEY}
      temperature: ${temperature}
      max_tokens: ${max_tokens}
      base_url: ${llm_base_url}
  probabilities: [1.0]
  writer: ${writer}
